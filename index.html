<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <!-- <img src="" alt="" id="logo" width="70" height="80px"> -->
             <i class='fa-solid fa-file-invoice' ></i>
            <h2 > Invoice Generator</h2>
        </div>
        <div class="row1">
            <div class="box">
                <h3>Company Details</h3>
                <input type="text" name="" id="" placeholder="Company name">
                <input type="text" name="" id="" placeholder="Company Address">
                <input type="text" name="" id="" placeholder="Phone Number">
            </div>
            <div class="box">
                <h3>Customer Details</h3>
                <input type="text" name="" id="" placeholder="Enter Name">
                <input type="email" name="" id="" placeholder="Enter email">
                <input type="text" name="" id="" placeholder="Phone Number">
            </div>
        </div>
        <div class="row1">
            <div class="box">
                <h3>Invoice Details</h3>
                <input type="text" name="" placeholder="Invoice Number" id="invoiceno">
                <input type="date" name="" id="" placeholder="">
            </div>
            <div class="box">
                <h3>Notes</h3>
                <textarea rows="5" placeholder="Enter Notes"></textarea>       
            </div>
        </div>
        <div class="row2">
            <h2>Products</h2>
            <table border="1" cellspacing="0px" >
                <thead>
                    <tr class="tabhead1">
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Amount</th>
                </tr>
                </thead>
                <tbody class="productbody">
                    <tr class="tabhead2">
                    <td><input type="text" name="" id="" class=""></td>
                    <td><input type="number" name="" id="" class="qty"></td>
                    <td><input type="number" name="" id="" class="price"></td>
                    <td class="amt">Rs. 0</td>
                </tr>
                </tbody>
            </table>
        </div>
    <div class="total">
        <div class="Subtotal">
            <span>Subtotal</span>
            <span id="Subtotal">Rs. 0</span>
        </div>
        <div>
            <label>GST %</label>
            <input type="number" name="" id="gstrate">
            <div>
                <!-- <span>GST</span> -->
                <span id="gst">Rs. 0</span>
            </div>
        </div>
        <div>
            <strong>Total Amount</strong>
            <strong id="total">Rs. 0</strong>
        </div>
    </div>
    <div class="btn">
        <button class="btnadd">Add items</button>
        <button id="printsave">Save Invoice</button>
        <button id="printbtn">Print Invoice</button>
        <button id="downloadpdf">Download PDF</button>
    </div>
    <div class="preview">
        <h3>Invoice Preview</h3>
        <p>Invoice No. <span id="previewinvoiceno"></span></p>
        <p>Subtotal: <span id="previewsubtotal"></span></p>
        <p>GST:<span id="previewgst"></span></p>
        <p>Total:<span id="previewtotal"></span></p>
    </div>
    </div>
    <footer class="footer">
        <p>&copy;2026 Invoice Generator. All Rights Reserved.</p>
    </footer>
</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>
</html>
